{{- if and .Values.auth.enabled (eq .Values.auth.existingSecret "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{ .Values.auth.existingSecretPasswordKey }}: {{ required "auth.password is required when auth.existingSecret is unset" .Values.auth.password | b64enc }}
{{- end }}
