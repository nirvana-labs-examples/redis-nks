{{- /*
Render an inline Secret only when the user has explicitly set
auth.password — i.e., the user owns the password value and wants it
embedded at template time. Skipped when:
  - auth.existingSecret is set (external Secret; reference it directly), or
  - auth.password is empty and generateIfMissing is true (the PreSync hook
    bootstraps the Secret with a random password at install time).
*/ -}}
{{- if and .Values.auth.enabled (eq .Values.auth.existingSecret "") (ne .Values.auth.password "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{ .Values.auth.existingSecretPasswordKey }}: {{ .Values.auth.password | b64enc }}
{{- end }}
