image:
  repository: redis
  tag: "7.4-alpine"
  pullPolicy: IfNotPresent

auth:
  enabled: true
  # Inline password for the rendered Secret. Leave empty when using
  # existingSecret instead.
  password: ""
  # Name of an externally-managed Secret holding the password.
  # When set, the chart skips rendering its own Secret.
  existingSecret: ""
  existingSecretPasswordKey: password

persistence:
  # Leave empty to use the cluster's default StorageClass.
  storageClass: ""
  size: 10Gi

service:
  # LoadBalancer exposes Redis on the cluster's private VPC IP.
  # Set to ClusterIP for in-cluster-only access.
  type: LoadBalancer
  port: 6379

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 1Gi
